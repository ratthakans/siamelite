# Decap CMS configuration for Siam Elite Consulting
# Docs: https://decapcms.org/docs/configuration-options/

backend:
  name: github
  repo: ratthakans/siamelite
  branch: main
  # Self-hosted OAuth relay (api/auth.js + api/callback.js), deployed as
  # Vercel serverless functions alongside the site — no Netlify involved.
  # Setup steps are in README.md under "ใช้งานจริงบน Vercel (ไม่ใช้ Netlify)".
  base_url: https://siamelite.vercel.app
  auth_endpoint: api/auth

# Lets you test this admin panel on your own computer (see README.md)
# by running `npx decap-server` alongside the site. Remove this line
# if you don't want local editing enabled once the site is deployed.
# Port 8478 here avoids a conflict on this machine — the default
# (no url override) is port 8081 if you run decap-server elsewhere.
local_backend:
  url: http://localhost:8478/api/v1

media_folder: "assets/img/properties"
public_folder: "assets/img/properties"

collections:
  - name: "properties"
    label: "อสังหาริมทรัพย์ (Properties)"
    files:
      - name: "listings"
        label: "รายการทรัพย์ทั้งหมด (All Listings)"
        file: "assets/data/properties.json"
        fields:
          - label: "รายการทรัพย์ (Listings)"
            name: "listings"
            widget: "list"
            label_singular: "ทรัพย์ 1 รายการ"
            summary: "{{title_th}} — {{price_th}}"
            fields:
              - label: "แสดงในหน้าแรก (Featured on homepage)"
                name: "featured"
                widget: "boolean"
                default: true
                hint: "ติ๊กไว้ถ้าอยากให้ทรัพย์นี้ขึ้นในหน้าแรกด้วย (นอกเหนือจากหน้าอสังหาฯ ทั้งหมด)"
              - label: "รหัสทรัพย์ (Property code — e.g. SE-MR07)"
                name: "code"
                widget: "string"
                hint: "รหัสไม่ซ้ำกัน ใช้ในลิงก์หน้ารายละเอียด แนะนำรูปแบบ SE-XX##"
              - label: "สถานะ (Status)"
                name: "status"
                widget: "select"
                options:
                  - { label: "ขาย (For Sale)", value: "sale" }
                  - { label: "เช่า (For Rent)", value: "rent" }
              - label: "ชนิดทรัพย์ (Property Type)"
                name: "type"
                widget: "select"
                options:
                  - { label: "วิลล่า (Villa)", value: "villa" }
                  - { label: "คอนโด (Condo)", value: "condo" }
                  - { label: "บ้าน (House)", value: "house" }
              - label: "ทำเล — รหัสสำหรับกรอง (Location code)"
                name: "location"
                widget: "select"
                hint: "ใช้สำหรับระบบ filter เท่านั้น ไม่แสดงผลตรงๆ"
                options:
                  - { label: "สันทราย / แม่โจ้", value: "sansai" }
                  - { label: "สารภี", value: "saraphi" }
                  - { label: "หางดง", value: "hangdong" }
                  - { label: "สันกำแพง", value: "sankamphaeng" }
                  - { label: "ในเมือง / รอบเมือง", value: "mueang" }
                  - { label: "โซนสนามบิน", value: "airport" }
                  - { label: "อื่นๆ", value: "other" }
              - label: "ทำเล ภาษาไทย (Location, Thai)"
                name: "location_th"
                widget: "string"
              - label: "Location, English"
                name: "location_en"
                widget: "string"
              - label: "ชื่อทรัพย์ ภาษาไทย (Title, Thai)"
                name: "title_th"
                widget: "string"
              - label: "Title, English"
                name: "title_en"
                widget: "string"
              - label: "รายละเอียด ภาษาไทย (Description, Thai)"
                name: "desc_th"
                widget: "text"
              - label: "Description, English"
                name: "desc_en"
                widget: "text"
              - label: "ห้องนอน (Bedrooms)"
                name: "beds"
                widget: "number"
                value_type: "int"
              - label: "ห้องน้ำ (Bathrooms)"
                name: "baths"
                widget: "number"
                value_type: "int"
              - label: "พื้นที่ใช้สอย ตร.ม. (Interior area, m²)"
                name: "sqm"
                widget: "number"
                value_type: "int"
              - label: "ที่ดิน ตร.ม. (Land area, m² — เว้นว่างสำหรับคอนโด)"
                name: "land_sqm"
                widget: "number"
                value_type: "int"
                required: false
              - label: "ชั้น (Floor — สำหรับคอนโดเท่านั้น)"
                name: "floor"
                widget: "number"
                value_type: "int"
                required: false
              - label: "ที่จอดรถ (Parking spaces)"
                name: "parking"
                widget: "number"
                value_type: "int"
              - label: "เฟอร์นิเจอร์ (Furnishing)"
                name: "furnished"
                widget: "select"
                options:
                  - { label: "ครบครัน (Fully furnished)", value: "full" }
                  - { label: "บางส่วน (Partly furnished)", value: "partial" }
                  - { label: "ไม่มีเฟอร์นิเจอร์ (Unfurnished)", value: "unfurnished" }
              - label: "การถือครอง (Ownership)"
                name: "ownership"
                widget: "select"
                hint: "สำคัญสำหรับลูกค้าต่างชาติ — แสดงในหน้ารายละเอียดพร้อมคำอธิบาย"
                options:
                  - { label: "กรรมสิทธิ์สมบูรณ์ (Freehold)", value: "freehold" }
                  - { label: "สิทธิการเช่าระยะยาว (Leasehold)", value: "leasehold" }
                  - { label: "โควตาต่างชาติ (Foreign quota)", value: "foreign-quota" }
                  - { label: "ถือผ่านนิติบุคคล (Thai company)", value: "thai-company" }
                  - { label: "สำหรับเช่า (Rental only)", value: "rental" }
              - label: "ราคา ภาษาไทย (Price, Thai — e.g. ฿ 12.5M or ฿ 45,000 / เดือน)"
                name: "price_th"
                widget: "string"
              - label: "Price, English (e.g. ฿ 12.5M or ฿ 45,000 / mo)"
                name: "price_en"
                widget: "string"
              - label: "งบประมาณระดับ — สำหรับกรอง (Budget tier)"
                name: "tier"
                widget: "select"
                hint: "สำหรับเช่า: เริ่มต้น = ต่ำกว่า ฿20,000 · กลาง = ฿20,000-30,000 · สูง = ฿30,000+"
                options:
                  - { label: "เริ่มต้น (Entry)", value: "a" }
                  - { label: "ระดับกลาง (Mid)", value: "b" }
                  - { label: "ระดับสูง (High)", value: "c" }
              - label: "จุดเด่น (Features / highlights)"
                name: "features"
                widget: "list"
                label_singular: "จุดเด่น 1 ข้อ"
                summary: "{{th}}"
                required: false
                fields:
                  - { label: "ไทย (Thai)", name: "th", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - label: "รูปหลัก / รูปปก (Main / cover photo)"
                name: "image"
                widget: "image"
              - label: "อัลบั้มรูป (Gallery — รูปในหน้ารายละเอียด)"
                name: "gallery"
                widget: "list"
                label_singular: "รูป 1 รูป"
                required: false
                field: { label: "รูป (Photo)", name: "image", widget: "image" }
